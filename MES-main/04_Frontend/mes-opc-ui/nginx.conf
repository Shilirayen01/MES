server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster delivery of JS/WASM assets
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/wasm
        application/octet-stream
        image/svg+xml;

    # Cache static assets aggressively (Blazor fingerprints them)
    location ~* \.(js|wasm|dll|dat|blat|css|ico|png|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unresolved route falls back to index.html
    # so Blazor's client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Never cache appsettings.json or index.html
    # so port/URL changes are always picked up immediately.
    location ~* (appsettings\.json|index\.html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }
}
